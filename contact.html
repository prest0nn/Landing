<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Drifted | Contact</title>

  <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./assets/css/require.css">
  <link rel="stylesheet" href="./assets/css/pages/contact.css">
</head>

<body>

  
  <div class="preloader" data-preloader>
    <div class="preloader-circle"></div>
  </div>

  
  <header class="header" data-header>
    <div class="container">

      <a href="./index.html" class="logo">
        <h1>Drifted&lt;&gt;</h1>
      </a>

      <nav class="navbar" data-navbar>
        <ul class="navbar-list">

          <li class="navbar-item">
            <a href="./index.html" class="label-lg navbar-link has-after">Home</a>
          </li>

          <li class="navbar-item">
            <a href="./service.html" class="label-lg navbar-link has-after">Services</a>
          </li>

          <li class="navbar-item">
            <a href="./portfolio.html" class="label-lg navbar-link has-after">Portfolio</a>
          </li>

          <li class="navbar-item">
            <a href="#" class="label-lg navbar-link has-after active">Contact</a>
          </li>

        </ul>
      </nav>

      <a href="./contact.html" class="btn btn-primary">Contact Now</a>

      <button class="nav-toggle-btn" aria-label="menu" data-nav-toggler>
        <ion-icon name="menu-outline"></ion-icon>
      </button>

    </div>
  </header>

  <
  <main>
    <section class="section contact has-bg-image"
      style="background-image: url('./assets/images/contact-bg.png')">

      <div class="container">

        
        <form onsubmit="sendToWhatsApp(event)" class="contact-form">

          <h2 class="headline-sm" id="contact-label">Get in touch</h2>

          <p class="contact-text body-md">
            Our friendly team would love to hear from you.
          </p>

          <div class="wrapper">

            <div>
              <label class="label">First name</label>
              <input type="text" id="name" placeholder="Name *" required class="input-field">
            </div>

            <div>
              <label class="label">Your Email</label>
              <input type="email" id="email" placeholder="Email *" required class="input-field">
            </div>

          </div>

          <label class="label">Subject</label>
          <input type="text" id="subject" placeholder="Subject *" class="input-field">

          <label class="label">Your message</label>
          <textarea id="message" placeholder="Your message *" required class="input-field"></textarea>

          
          <button type="submit" class="btn btn-tertiary">
            <span id="btnText">Send Message</span>
            <span id="btnLoading" style="display:none;">Sending...</span>
          </button>

        </form>

        
        <div class="contact-content">

          <ul class="contact-list">

            <li class="contact-item">
              <div class="item-icon" style="background-color: hsl(177, 39%, 72%)">
                <ion-icon name="call" aria-hidden="true"></ion-icon>
              </div>
              <div>
                <p class="label-lg">Phone</p>
                <a href="tel:+2348038271775" class="body-lg">+2348038271775</a>
              </div>
            </li>

            <li class="contact-item">
              <div class="item-icon" style="background-color: hsl(41, 99%, 64%)">
                <ion-icon name="mail" aria-hidden="true"></ion-icon>
              </div>
              <div>
                <p class="label-lg">Mail</p>
                <a href="mailto:astonic23@gmail.com" class="body-lg">astonic23@gmail.com</a>
              </div>
            </li>

            <li class="contact-item">
              <div class="item-icon" style="background-color: hsl(19, 97%, 85%)">
                <ion-icon name="location" aria-hidden="true"></ion-icon>
              </div>
              <div>
                <p class="label-lg">Visit My Studio</p>
                <address class="body-lg">
                Festac Town, Lagos Nigeria
                </address>
              </div>
            </li>

          </ul>

        </div>

      </div>
    </section>
  </main>

  
  <footer class="footer">
    <div class="container">
      <p class="text-center">© 2026 copyright all right reserved</p>
    </div>
  </footer>

 
  <script>
    function sendToWhatsApp(e) {
      e.preventDefault();

      const btnText = document.getElementById("btnText");
      const btnLoading = document.getElementById("btnLoading");

      
      btnText.style.display = "none";
      btnLoading.style.display = "inline";

      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const subject = document.getElementById("subject").value;
      const message = document.getElementById("message").value;

      const phoneNumber = "2348038271775";

      const whatsappText =
        "Hello, my name is " + name + "\n\n" +
        "Email: " + email + "\n" +
        "Subject: " + subject + "\n\n" +
        "Message:\n" + message;

      const url = "https://wa.me/" + phoneNumber + "?text=" + encodeURIComponent(whatsappText);

      setTimeout(() => {
        window.open(url, "_blank");

        
        btnText.style.display = "inline";
        btnLoading.style.display = "none";

        document.querySelector(".contact-form").reset();
      }, 1200);
    }
  </script>


  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

  <script src="./assets/js/script.js"></script>

</body>

</html>
